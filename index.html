<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background: linear-gradient(135deg,#0f0f0f,#1a1a1a,#111827);
  color:#e5e5e5;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* soft glow background */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at top,#2b2b2b,#000);
  opacity:0.8;
  z-index:-1;
}

.card{
  width:90%;
  max-width:700px;
  background:rgba(255,255,255,0.05);
  padding:35px;
  border-radius:18px;
  backdrop-filter:blur(12px);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  text-align:center;
  animation:fade 1.5s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  font-weight:500;
  font-size:28px;
  letter-spacing:1px;
  margin-bottom:10px;
}

p{
  font-weight:300;
  font-size:16px;
  line-height:1.8;
  color:#cfcfcf;
}

.media img{
  width:180px;
  height:180px;
  object-fit:cover;
  border-radius:12px;
  margin:10px;
  filter:grayscale(20%);
  transition:0.3s;
}

.media img:hover{
  filter:grayscale(0%);
  transform:scale(1.05);
}

video{
  width:100%;
  border-radius:12px;
  margin-top:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:#ffffff10;
  color:#e5e5e5;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ffffff20;
}

audio{
  display:none;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<h1>A Message for You</h1>

<p>
Some people quietly become the most important part of your life without even trying.  
This is not about words, it is about feelings that stay even in silence.  
You are that quiet presence that feels like comfort, peace and home at the same time.
</p>

<div class="media">
<img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7">
<img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131">
</div>

<h1>Watch This</h1>

<video controls>
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d5a2b3c2b7.mp3?filename=romantic-love-110397.mp3">
</audio>

<button onclick="document.getElementById('music').play()">
Play Music
</button>

</div>

</body>
</html>
